[build]
  command = "echo 'Static site - no build needed'"
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

[[redirects]]
  from = "/images/*"
  to = "/attached_assets/:splat"
  status = 200
